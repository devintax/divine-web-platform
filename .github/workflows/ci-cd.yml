name: Legacy CI / CD (manual only)

on:
  workflow_dispatch: {}

jobs:
  build:
    name: Build and lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

      - name: Build Temporal worker
        run: npm run worker:build

  deploy:
    name: Deploy on main
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        if: secrets.VERCEL_TOKEN != ''
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Deploy to Railway
        if: secrets.RAILWAY_TOKEN != ''
        run: |
          curl -sL https://railway.app/install.sh | sh
          railway login --apiKey "$RAILWAY_TOKEN"
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment placeholder
        if: secrets.VERCEL_TOKEN == '' && secrets.RAILWAY_TOKEN == ''
        run: |
          echo "No deployment secret configured."
          echo "Add VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID or RAILWAY_TOKEN to the GitHub repo secrets to enable automatic deployment."
