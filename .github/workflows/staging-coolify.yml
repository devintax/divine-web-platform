name: Staging CI / Coolify deploy

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

jobs:
  build:
    name: Build staging branch
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

      - name: Build Temporal worker
        run: npm run worker:build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: .next

  deploy:
    name: Deploy staging to Coolify
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify about branch
        run: echo "Deploying branch $GITHUB_REF_NAME to Coolify staging"

      - name: Deploy to Coolify via API
        if: secrets.COOLIFY_API_URL != '' && secrets.COOLIFY_API_TOKEN != '' && secrets.COOLIFY_APP_ID != ''
        run: |
          curl --fail --show-error --silent -X POST "${{ secrets.COOLIFY_API_URL }}/api/apps/${{ secrets.COOLIFY_APP_ID }}/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch":"staging"}'

      - name: Deploy to Coolify via SSH
        if: secrets.COOLIFY_SSH_HOST != '' && secrets.COOLIFY_SSH_USER != '' && secrets.COOLIFY_SSH_KEY != ''
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.COOLIFY_SSH_KEY }}

      - name: Trigger SSH deploy command
        if: secrets.COOLIFY_SSH_HOST != '' && secrets.COOLIFY_SSH_USER != '' && secrets.COOLIFY_SSH_KEY != ''
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.COOLIFY_SSH_USER }}@${{ secrets.COOLIFY_SSH_HOST }} \
            "cd ${{ secrets.COOLIFY_APP_PATH || '/var/coolify/apps/your-app' }} && git pull origin staging && docker compose pull && docker compose up -d"

      - name: Coolify deployment placeholder
        if: secrets.COOLIFY_API_URL == '' && secrets.COOLIFY_API_TOKEN == '' && secrets.COOLIFY_SSH_HOST == ''
        run: |
          echo "No Coolify deployment secrets provided."
          echo "Add COOLIFY_API_URL, COOLIFY_API_TOKEN, COOLIFY_APP_ID or COOLIFY_SSH_HOST, COOLIFY_SSH_USER, COOLIFY_SSH_KEY to enable automatic staging deploys."
